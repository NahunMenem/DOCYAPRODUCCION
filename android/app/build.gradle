plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"      // Firebase Messaging
}

// ================================
//   🔐 CARGAR KEYSTORE (RELEASE)
// ================================
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.docya.paciente"
    compileSdkVersion 36

    defaultConfig {
        applicationId "com.docya.paciente"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 36
        versionCode 8
        versionName "1.1.1"
        multiDexEnabled true
    }

    // 🔥 JAVA 17 OBLIGATORIO
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    // 🔥 KOTLIN JVM 17
    kotlinOptions {
        jvmTarget = "17"
    }

    // ============================
    //   🔐 FIRMA RELEASE
    // ============================
    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            shrinkResources false
        }
    }
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
    implementation "androidx.multidex:multidex:2.0.1"
    implementation platform('androidx.compose:compose-bom:2024.12.01')
    implementation 'androidx.compose.ui:ui'
    implementation 'androidx.compose.ui:ui-text'
    implementation platform('com.mercadopago.android.sdk:sdk-android-bom:0.1.7')
    implementation 'com.mercadopago.android.sdk:core-methods'
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.8.7'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.9.0'

    // Firebase Messaging
    implementation platform('com.google.firebase:firebase-bom:33.5.1')
    implementation 'com.google.firebase:firebase-messaging'

    // Google Play Services
    implementation 'com.google.android.gms:play-services-base:18.5.0'
}

flutter {
    source = "../.."
}
